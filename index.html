<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Happy Birthday Nila 🎉</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="bg-slideshow"></div>
    <div class="particles"></div>

    <div class="card">
        <h1 id="mainTitle">Hey Nila 👋</h1>
        <p id="displayMessage">Click below to begin</p>

        <div id="memoryPlayer" class="hidden-player">
            <div style="display: flex; justify-content: center; width: 100%; box-sizing: border-box;">
                <iframe style="border-radius:12px; max-width: 100%;" 
                    src="https://open.spotify.com/embed/track/1aHy1ipWQRNauI0ee9uYfi" 
                    frameBorder="0" 
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy">
                </iframe>
            </div>
            <a href="https://open.spotify.com/track/1aHy1ipWQRNauI0ee9uYfi" target="_blank" style="text-decoration: none; display: block; width: 100%;">
                <button>Open in Spotify 🎧</button>
            </a>
        </div>

        <button id="actionBtn" onclick="nextMessage()">Start</button>
        <button id="finalBtn" onclick="goToFinalPage()" style="display:none;">
            Click Me 🎁
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
